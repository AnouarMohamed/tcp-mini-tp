name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        if: matrix.go-version == '1.23'
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "❌ Go files need formatting:"
            gofmt -s -d .
            exit 1
          fi
          echo "✅ All Go files are properly formatted"

      - name: Run go vet
        if: matrix.go-version == '1.23'
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: go-${{ matrix.go-version }}
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Build server
        run: go build -o bin/server ./server

      - name: Build client
        run: go build -o bin/client ./client

      - name: Verify binaries exist
        run: |
          test -f bin/server || (echo "❌ server binary not found" && exit 1)
          test -f bin/client || (echo "❌ client binary not found" && exit 1)
          echo "✅ Both binaries built successfully"
